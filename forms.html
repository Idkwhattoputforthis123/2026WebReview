<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>
<body>
    <form action="data/submit.php" method="POST">
        <label for="name">Your Name:</label>
        <input type="text" name="name" id="name" placeholder="ragedy">

        <label for="grade">Grade level</label>
        <select name="grade" id="grade">
            <option value="kinder">Kindergarden</option>
            <option value="10">10th grade</option>
            <option value="11">11th</option>
        </select>

        <label for="bio">Tell us about yourself</label>
        <textarea name="bio" id="bio" rows="4"></textarea>

        <label for="agree">I do not agree to the terms and conditions</label>
        <input type="checkbox" id="agree" name="agree">

        <label for="collageg"></label>
        <input type="radio" id="collage" name="major" value="" required>
        
    </form>
</body>
</html>
